name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit types
        run: pnpm svelte-kit sync

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang libclang-dev file curl wget git pkg-config libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib
